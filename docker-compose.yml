version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: logistics_system
      TZ: Asia/Shanghai # 设置容器时区为 Asia/Shanghai (UTC+8)
    command:
      - --default-time-zone=+08:00 # MySQL 服务器默认时区
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # MySQL自定义配置 - UTF-8编码
      - ./mysql/conf.d:/etc/mysql/conf.d
      # 挂载 0312 sql文件，在首此启动mysql时自动执行初始化
      - ./init_0312.sql:/docker-entrypoint-initdb.d/init_0312.sql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai # 设置容器时区为 Asia/Shanghai (UTC+8)
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: track-17-server
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - DB_URL=jdbc:mysql://mysql:3306/logistics_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=123456
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_REDIS_HOST=redis
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    container_name: track-17-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - app

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
