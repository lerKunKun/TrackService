spring:
  application:
    name: track-17-server

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
      enabled: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/logistics_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:Track17Redis@2026}
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.logistics.track17.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8080
#  address: 0.0.0.0
  servlet:
    context-path: /api/v1

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:track17-logistics-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

# 17Track API Configuration
track17:
  api:
    url: https://api.17track.net/track/v2.4
    token: ${TRACK17_TOKEN:872063955E597617098184FDD971DD16}
    register-endpoint: /register
    query-endpoint: /gettrackinfo
    timeout: 10000

# Shopify OAuth Configuration
shopify:
  api:
    key: ${SHOPIFY_API_KEY:fb439dc379d34cca96383be85a8eebbf}
    secret: ${SHOPIFY_API_SECRET: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}
  oauth:
    redirect-uri: http://localhost:8080/api/v1/oauth/shopify/callback
    frontend-redirect: http://localhost:3000/shops
  webhook:
    base-url: https://institution-reservoir-float-son.trycloudflare.com/api/v1  # 生产版更换公网URL

# DingTalk OAuth Configuration
dingtalk:
  corp-id: ${DINGTALK_CORP_ID:ding5a2a2426f8bfaff7a1320dcb25e91351}
  app-key: ${DINGTALK_APP_KEY:ding2o5exqttk4d9vjqq}
  app-secret: ${DINGTALK_APP_SECRET:atE27kNpKYUlwHy9jGHL1T5sPfZUn0gDe3q87uT9kDPF5TWySizUPX-lf0JIHJdP}
  agent-id: ${DINGTALK_AGENT_ID:3875497210}
  redirect-uri: ${DINGTALK_REDIRECT_URI:http://localhost:3000/api/v1/auth/dingtalk/callback}
  frontend-redirect: ${DINGTALK_FRONTEND_REDIRECT:http://localhost:3000}
  qr-connect-url: https://login.dingtalk.com/oauth2/auth  # OAuth 2.0 授权地址
  token-url: https://api.dingtalk.com/v1.0/oauth2/userAccessToken
  user-info-url: https://api.dingtalk.com/v1.0/contact/users/me
  notification:
    enabled: true  # 是否开启钉钉通知推送

# Security AOP Configuration
security:
  aop:
    enabled: true  # 是否启用AOP鉴权（排除路径在AuthenticationAspect中配置）

logging:
  level:
    com.logistics.track17: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ========== Shopify Theme Migration Configuration ==========

