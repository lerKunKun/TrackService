name: Deploy to Cloud Server

# 触发条件：当 main 分支有代码 push 时触发 (根据你的主分支修改)
on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }} # 你的云服务器 IP
          username: ${{ secrets.SERVER_USER }} # 登录用户名 (通常是 root)
          password: ${{ secrets.SERVER_PASSWORD }} # (可选) 你的服务器密码，建议用私钥
          key: ${{ secrets.SERVER_SSH_KEY }} # (推荐) 你的服务器 SSH 私钥
          port: 22 # 默认22端口
          # -------------------------------------------------------------
          # 【重要提示】: 以下这一行 `cd` 命令后面的路径，
          # 必须修改为你自己云服务器上项目代码实际存放的绝对路径！
          # 例如: cd /root/track-service-git 
          # -------------------------------------------------------------
          script: |
            TARGET_DIR="/opt/track-service-git"
            REPO_URL="https://github.com/${{ github.repository }}.git" # 注意: 如果你仓库是私有仓库，克隆可能需要鉴权

            # 1. 如果目录不存在或不是 git 仓库，则进行 git clone
            if [ ! -d "$TARGET_DIR/.git" ]; then
              echo "=> 目标目录不存在或不是 Git 仓库。正在新克隆..."
              # 如果 $TARGET_DIR 已经存在但非空，先删除或重命名
              rm -rf $TARGET_DIR
              git clone $REPO_URL $TARGET_DIR
            fi
            
            # 2. 进入目录并拉取最新代码 (强制覆盖本地修改)
            cd $TARGET_DIR
            echo "=> 正在拉取最新的修改..."
            git fetch --all
            # 自动获取当前默认分支名并强制重置
            BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')
            git reset --hard origin/${BRANCH:-main}

            # 3. 赋予执行权限并运行部署脚本
            chmod +x deploy.sh
            ./deploy.sh
